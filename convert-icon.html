    <line x1="120" y1="22" x2="125" y2="193" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>

</svg>`

function svgToPng(svgStr, size, filename) {
  const canvas = document.createElement('canvas')
  canvas.width = size; canvas.height = size
  const ctx = canvas.getContext('2d')
  const img = new Image()
  const blob = new Blob([svgStr], {type: 'image/svg+xml'})
  const url = URL.createObjectURL(blob)
  img.onload = function() {
    ctx.drawImage(img, 0, 0, size, size)
    const a = document.createElement('a')
    a.download = filename
    a.href = canvas.toDataURL('image/png')
    a.click()
    URL.revokeObjectURL(url)
  }
  img.src = url
}

window.onload = function() {
  svgToPng(svgStr, 512, 'icon-512.png')
  setTimeout(() => svgToPng(svgStr, 192, 'icon-192.png'), 500)
  document.body.innerHTML = '<h2 style="font-family:sans-serif;padding:2rem">✅ icon-512.png, icon-192.png 다운로드 완료!<br><br>다운로드 폴더에서 C:\\wta\\public\\ 으로 복사하세요.</h2>'
}
</script>
